<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - SkillMatch</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Top Navigation -->
    <div class="top-nav">
        <div class="nav-tabs">
            <a href="../index.html" class="nav-tab">1. Home</a>
            <a href="login.html" class="nav-tab">2. Login</a>
            <a href="dashboard.html" class="nav-tab">3. Dashboard</a>
            <a href="assessment.html" class="nav-tab">4. Assessment</a>
            <a href="results.html" class="nav-tab">5. Results</a>
            <a href="skillgap.html" class="nav-tab">6. Skill Gap</a>
            <a href="jobs.html" class="nav-tab">7. Job Board</a>
            <a href="admin-login.html" class="nav-tab active">8. Admin</a>
        </div>
    </div>

    <div class="container">
        <div style="max-width: 450px; margin: 80px auto;">
            <div class="auth-card">
                <div style="text-align: center; margin-bottom: 30px;">
                    <div style="font-size: 4rem; margin-bottom: 15px;">🔐</div>
                    <h2>Admin Login</h2>
                    <p class="subtitle">Authorized personnel only</p>
                </div>
                
                <form id="adminLoginForm">
                    <div class="form-group">
                        <label>Admin Email</label>
                        <input type="email" id="adminEmail" placeholder="admin@career.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="adminPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary btn-large">Login as Admin</button>
                </form>

                <p style="text-align: center; margin-top: 20px; color: var(--text-gray);">
                    Not an admin? <a href="login.html" style="color: var(--primary); text-decoration: none; font-weight: 600;">User Login</a>
                </p>
            </div>

            <div id="message"></div>
        </div>
    </div>

    <script src="../js/admin-login.js"></script>
</body>
</html>
