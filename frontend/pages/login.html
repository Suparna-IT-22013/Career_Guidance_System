<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - SkillMatch</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <!-- Top Navigation -->
    <div class="top-nav">
        <div class="nav-tabs">
            <a href="../index.html" class="nav-tab">1. Home</a>
            <a href="login.html" class="nav-tab active">2. Login</a>
            <a href="dashboard.html" class="nav-tab">3. Dashboard</a>
            <a href="assessment.html" class="nav-tab">4. Assessment</a>
            <a href="results.html" class="nav-tab">5. Results</a>
            <a href="skillgap.html" class="nav-tab">6. Skill Gap</a>
            <a href="jobs.html" class="nav-tab">7. Job Board</a>
            <a href="admin-login.html" class="nav-tab">8. Admin</a>
        </div>
    </div>

    <div class="container">
        <div style="max-width: 500px; margin: 50px auto;">
            <!-- Login Form -->
            <div id="loginCard" class="auth-card">
                <h2>Welcome Back</h2>
                <p class="subtitle">Sign in to SkillMatch</p>
                <form id="loginForm">
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="loginEmail" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="loginPassword" placeholder="••••••••" required>
                    </div>
                    <a href="#" style="color: var(--primary); text-decoration: none; font-size: 14px; display: block; margin-bottom: 15px;">Forgot password?</a>
                    <button type="submit" class="btn btn-primary btn-large">Sign In</button>
                </form>
               
                <p style="text-align: center; margin-top: 20px; color: var(--text-gray);">
                    Don't have an account? <a href="#" onclick="showRegister()" style="color: var(--primary); text-decoration: none; font-weight: 600;">Create Account</a>
                </p>
            </div>

            <!-- Register Form (Hidden by default) -->
            <div id="registerCard" class="auth-card" style="display: none;">
                <h2>Create Account</h2>
                <p class="subtitle">Start your journey today</p>
                <form id="registerForm">
                    <div class="form-row">
                        <div class="form-group">
                            <label>First name</label>
                            <input type="text" id="firstName" placeholder="John" required>
                        </div>
                        <div class="form-group">
                            <label>Last name</label>
                            <input type="text" id="lastName" placeholder="Doe" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="email" id="registerEmail" placeholder="john@example.com" required>
                    </div>
                    <div class="form-group">
                        <label>Education level</label>
                        <select id="educationLevel" required>
                            <option value="">Select...</option>
                            <option value="high-school">High School</option>
                            <option value="diploma">Diploma</option>
                            <option value="bachelors">Bachelor's Degree</option>
                            <option value="masters">Master's Degree</option>
                            <option value="phd">PhD</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" id="registerPassword" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-success btn-large">Create Account</button>
                </form>
                <p style="text-align: center; margin-top: 20px; color: var(--text-gray);">
                    Already have an account? <a href="#" onclick="showLogin()" style="color: var(--primary); text-decoration: none; font-weight: 600;">Sign In</a>
                </p>
            </div>

            <div id="message"></div>
        </div>
    </div>

    <script src="../js/auth.js"></script>
    <script>
        function showRegister() {
            document.getElementById('loginCard').style.display = 'none';
            document.getElementById('registerCard').style.display = 'block';
            document.getElementById('message').innerHTML = '';
        }

        function showLogin() {
            document.getElementById('registerCard').style.display = 'none';
            document.getElementById('loginCard').style.display = 'block';
            document.getElementById('message').innerHTML = '';
        }
    </script>
</body>
</html>
